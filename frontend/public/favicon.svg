<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo arredondado gradiente índigo -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Barras do gráfico (brancas com opacidades diferentes) -->
  <!-- Barra 1 — baixa -->
  <rect x="5"  y="20" width="5" height="7" rx="1.5" fill="white" opacity="0.55"/>
  <!-- Barra 2 — média -->
  <rect x="13" y="14" width="5" height="13" rx="1.5" fill="white" opacity="0.80"/>
  <!-- Barra 3 — alta -->
  <rect x="21" y="8"  width="5" height="19" rx="1.5" fill="white"/>

  <!-- Linha de base -->
  <rect x="4" y="28" width="24" height="1.5" rx="0.75" fill="white" opacity="0.4"/>
</svg>
